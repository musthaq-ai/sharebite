<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        {% block title %}

        ShareBite

        {% endblock %}

    </title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="container-fluid">

    <div class="row min-vh-100 g-0">

        <!-- LEFT -->

        <div class="col-lg-5 d-flex align-items-center justify-content-center px-5">

            {% block form %}

            {% endblock %}

        </div>

        <!-- RIGHT -->

        <div class="col-lg-7 illustration-side d-none d-lg-flex align-items-center justify-content-center">

            <div class="hero-content text-center">

                <img
                    src="{{ url_for('static', filename='images/hero.png') }}"
                    class="hero-image">

               
                <p>

                    Connecting restaurants, hotels, marriage halls and NGOs
                    through one smart platform to reduce food waste.

                </p>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>

</html>
