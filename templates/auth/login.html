{% extends "auth/auth_layout.html" %}

{% block title %}
Login
{% endblock %}

{% block form %}

<div class="login-card">

    <a href="{{ url_for('home.index') }}" class="brand">

        <span class="brand-share">

        Share

    </span>

    <span class="brand-bite">

        Bite

    </span>

</a>
    <h2 class="mt-4">

        Welcome Back 👋

    </h2>

    <p>

        Sign in to continue helping communities through Food Bridge.

    </p>

    <form method="POST">

        <div class="mb-3">

            <label>Email Address</label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="bi bi-envelope-fill"></i>

                </span>

                <input
                    type="email"
                    class="form-control"
                    name="email"
                    required>

            </div>

        </div>

        <div class="mb-4">

            <label>Password</label>

            <div class="input-group">

                <span class="input-group-text">

                    <i class="bi bi-lock-fill"></i>

                </span>

                <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required>

                <button
                    class="btn btn-light border"
                    id="togglePassword"
                    type="button">

                    <i class="bi bi-eye"></i>

                </button>

            </div>

        </div>

        <button
            class="btn login-btn w-100">

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        </button>

    </form>

    <div class="divider">

        OR

    </div>

    <div class="row g-3">

        <div class="col-6">

            <a
                href="{{ url_for('auth.donor_register') }}"
                class="register-card">

                <i class="bi bi-shop"></i>

                <h6>

                    Register as Donor

                </h6>

            </a>

        </div>

        <div class="col-6">

            <a
                href="{{ url_for('auth.ngo_register') }}"
                class="register-card">

                <i class="bi bi-buildings"></i>

                <h6>

                    Register as NGO

                </h6>

            </a>

        </div>

    </div>

</div>

{% endblock %}
