<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        {% block title %}

        ShareBite

        {% endblock %}

    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Auth CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="container-fluid">

    <div class="row min-vh-100 g-0">

        <!-- LEFT SIDE -->
        <div class="col-lg-7 d-flex align-items-center justify-content-center p-4">

            <div class="auth-card w-100" style="max-width:620px;">

                {% block content %}

                {% endblock %}

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center auth-side">

            <div class="text-center px-4">

                <img
                    src="{{ url_for('static', filename='images/hero.png') }}"
                    class="hero-image img-fluid mb-4"
                    style="max-width:320px;">

                

                <p class="fs-5 text-muted">

                    Connecting restaurants, hotels, marriage halls and NGOs
                    through one smart platform to reduce food waste
                    and nourish communities.

                </p>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script src="{{ url_for('static', filename='js/validation.js') }}"></script>

</body>

</html>
